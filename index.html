<!DOCTYPE html>

<head>

<meta name="theme-color" content="#D98CA6">

<link rel="stylesheet" href="css/style.css">

<body>

<header class="app-header">
  <button id="backBtn" class="header-back" hidden aria-label="トップへ戻る">‹</button>
  <a class="brand" href="#" aria-label="ガーベラ トップへ">
    <svg class="brand-mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g fill="#E8B4C8">
        <ellipse cx="16" cy="6" rx="4" ry="7"/><ellipse cx="16" cy="26" rx="4" ry="7"/>
        <ellipse cx="6" cy="16" rx="7" ry="4"/><ellipse cx="26" cy="16" rx="7" ry="4"/>
        <ellipse cx="9" cy="9" rx="4.5" ry="6" transform="rotate(-45 9 9)"/>
        <ellipse cx="23" cy="9" rx="4.5" ry="6" transform="rotate(45 23 9)"/>
        <ellipse cx="9" cy="23" rx="4.5" ry="6" transform="rotate(45 9 23)"/>
        <ellipse cx="23" cy="23" rx="4.5" ry="6" transform="rotate(-45 23 23)"/>
      </g>
      <circle cx="16" cy="16" r="5.5" fill="#C06F8D"/>
    </svg>
    <span class="brand-title">ガーベラ</span>
  </a>
</header>

<main id="view"></main>

<div id="sheetBackdrop" class="sheet-backdrop" hidden></div>
<section id="sheet" class="sheet" hidden aria-modal="true" role="dialog">
  <div class="sheet-grabber" aria-hidden="true"></div>
  <div class="sheet-head">
    <span id="sheetIcon" class="sheet-icon" aria-hidden="true"></span>
    <span id="sheetTitle" class="sheet-title"></span>
    <button id="sheetClose" class="sheet-close" aria-label="閉じる">×</button>
  </div>
  <div id="sheetBody" class="sheet-body"></div>
</section>

<nav id="bottomNav" class="bottom-nav" aria-label="共通ツール"></nav>

<div id="toast" class="toast" role="status"></div>

<script src="js/core.js"></script>
<script src="js/data.js"></script>
<script src="js/tools/dice.js"></script>
<script src="js/tools/omikuji.js"></script>
<script src="js/tools/counter.js"></script>
<script src="js/tools/stopwatch.js"></script>
<script src="js/tools/timer.js"></script>
<script src="js/tools/roulette.js"></script>

<script src="js/tools/ptconv.js"></script>
<script src="js/tools/calc.js"></script>
<script src="js/tools/theme.js"></script>
<script src="js/tools/psych.js"></script>
<script src="js/app.js"></script>
</body>
</html>
